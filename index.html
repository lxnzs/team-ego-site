<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Team Ego | Roster</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg: #05070a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 50% -20%, #1e2a3a 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, #0d1117 0%, transparent 40%);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        /* HEADER */
        .header {
            text-align: center;
            margin-bottom: 60px;
        }

        .logo-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .logo-glow {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 120%; height: 120%;
            background: var(--primary);
            filter: blur(40px);
            opacity: 0.2;
            z-index: -1;
        }

        .logo-img {
            width: 120px;
            filter: drop-shadow(0 0 10px rgba(0,242,254,0.5));
        }

        .team-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 42px;
            font-weight: 900;
            letter-spacing: 8px;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        /* SECTION LABEL */
        .section-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            color: var(--primary);
            letter-spacing: 3px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            opacity: 0.8;
        }

        .section-label::after {
            content: "";
            height: 1px;
            flex-grow: 1;
            background: linear-gradient(to right, var(--primary), transparent);
        }

        /* PLAYER CARD */
        .player-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px 30px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .player-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: var(--primary);
            opacity: 0;
            transition: 0.3s;
        }

        .player-card:hover {
            transform: translateX(10px) scale(1.02);
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(0, 242, 254, 0.4);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .player-card:hover::before { opacity: 1; }

        .player-info {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .avatar-box {
            width: 55px;
            height: 55px;
            background: #111;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .avatar-box img {
            width: 80%;
            height: 80%;
            object-fit: contain;
            filter: brightness(0) invert(1); /* Делает силуэт белым */
        }

        .nickname {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .role-badge {
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 20px;
            background: rgba(0, 242, 254, 0.05);
            border: 1px solid var(--primary);
            color: var(--primary);
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
            box-shadow: inset 0 0 10px rgba(0, 242, 254, 0.1);
        }

        .sub-box {
            text-align: center;
            padding: 30px;
            border: 2px dashed var(--border);
            border-radius: 16px;
            color: var(--text-muted);
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            letter-spacing: 2px;
        }

        /* Анимация появления */
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: slideIn 0.6s ease forwards;
        }
    </style>
</head>
<body>

<div class="container">
    <header class="header">
        <div class="logo-wrapper">
            <div class="logo-glow"></div>
            <img src="logo.PNG" alt="EGO" class="logo-img">
        </div>
        <h1 class="team-title">Team Ego</h1>
    </header>

    <div class="section-label">MAIN ROSTER</div>

    <div class="player-card fade-in" style="animation-delay: 0.1s;">
        <div class="player-info">
            <div class="avatar-box">
                <img src="avatar.PNG" alt="player">
            </div>
            <div class="nickname">-himeraa666</div>
        </div>
        <div class="role-badge">IGL / AWP</div>
    </div>

    <div class="player-card fade-in" style="animation-delay: 0.2s;">
        <div class="player-info">
            <div class="avatar-box">
                <img src="avatar.PNG" alt="player">
            </div>
            <div class="nickname">angeldust</div>
        </div>
        <div class="role-badge">RIFLE</div>
    </div>

    <div class="player-card fade-in" style="animation-delay: 0.3s;">
        <div class="player-info">
            <div class="avatar-box">
                <img src="avatar.PNG" alt="player">
            </div>
            <div class="nickname">lanes</div>
        </div>
        <div class="role-badge">SUPPORT</div>
    </div>

    <div class="player-card fade-in" style="animation-delay: 0.4s;">
        <div class="player-info">
            <div class="avatar-box">
                <img src="avatar.PNG" alt="player">
            </div>
            <div class="nickname">aimlord</div>
        </div>
        <div class="role-badge">LURKER</div>
    </div>

    <div class="player-card fade-in" style="animation-delay: 0.5s;">
        <div class="player-info">
            <div class="avatar-box">
                <img src="avatar.PNG" alt="player">
            </div>
            <div class="nickname">SOON...</div>
        </div>
        <div class="role-badge">TBD</div>
    </div>

    <div class="section-label" style="margin-top: 40px;">SUBSTITUTES</div>
    <div class="sub-box fade-in" style="animation-delay: 0.6s;">
        SEARCHING FOR TALENTS...
    </div>
</div>

</body>
</html>
