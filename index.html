<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Team Ego | Elite Roster</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00f2fe;
            --bg: #030508;
            --card-bg: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            --accent-glow: rgba(0, 242, 254, 0.3);
            --bad: #ff4b4b;
            --okay: #ffb800;
            --good: #00ff85;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(0, 242, 254, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(0, 242, 254, 0.05) 0%, transparent 40%);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            padding: 40px 20px;
        }

        .container { width: 100%; max-width: 850px; margin: 0 auto; }

        /* --- HEADER --- */
        .header { text-align: center; margin-bottom: 50px; }
        .logo-img { width: 150px; filter: drop-shadow(0 0 20px var(--accent-glow)); transition: 0.3s; }
        .logo-img:hover { transform: scale(1.05) rotate(2deg); }
        .team-title {
            font-family: 'Orbitron', sans-serif; font-size: 42px; font-weight: 900;
            letter-spacing: 10px; text-transform: uppercase; margin-top: 15px;
            background: linear-gradient(to bottom, #fff 40%, var(--primary) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* --- SECTION LABEL --- */
        .section-label {
            font-family: 'Orbitron', sans-serif; font-size: 12px; color: var(--primary);
            letter-spacing: 5px; margin: 40px 0 20px; text-transform: uppercase;
            display: flex; align-items: center; opacity: 0.8;
        }
        .section-label::before { content: "[ "; margin-right: 5px; }
        .section-label::after { content: " ]"; margin-left: 5px; flex-grow: 1; border-bottom: 1px solid rgba(0, 242, 254, 0.2); margin-top: 2px; }

        /* --- PLAYER CARD (THE NEW STYLE) --- */
        .player-item {
            position: relative;
            background: var(--card-bg);
            margin-bottom: 20px;
            clip-path: polygon(0% 0%, 95% 0%, 100% 25%, 100% 100%, 5% 100%, 0% 75%);
            border-left: 2px solid var(--primary);
            transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            cursor: pointer;
            overflow: hidden;
        }

        .player-item:hover {
            transform: scale(1.02);
            background: rgba(0, 242, 254, 0.05);
            box-shadow: -10px 0 30px rgba(0, 242, 254, 0.1);
        }

        /* Силуэт: теперь это полноценная часть композиции */
        .player-silhouette {
            position: absolute;
            left: -10px;
            bottom: -10px;
            height: 120%;
            width: 200px;
            background-image: url('avatar.PNG');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: left bottom;
            filter: brightness(0) contrast(1.2) opacity(0.2); /* Полностью черный силуэт */
            transition: 0.5s;
            z-index: 1;
        }

        .player-item:hover .player-silhouette {
            filter: brightness(0.2) sepia(1) hue-rotate(140deg) opacity(0.4);
            transform: translateX(10px) scale(1.05);
        }

        .player-header {
            padding: 30px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 2;
        }

        .player-name-wrapper {
            display: flex;
            flex-direction: column;
            margin-left: 60px; /* Даем место силуэту */
        }

        .nickname {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 900;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .flag-img { width: 22px; filter: saturate(1.2); }

        .role-text {
            font-size: 10px;
            color: var(--primary);
            letter-spacing: 3px;
            margin-top: 5px;
            font-weight: 600;
            opacity: 0.7;
        }

        .faceit-link img {
            width: 24px;
            opacity: 0.5;
            transition: 0.3s;
        }
        .faceit-link:hover img { opacity: 1; filter: drop-shadow(0 0 8px var(--primary)); }

        /* --- STATS PANEL --- */
        .stats-panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease-out;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            position: relative;
            z-index: 3;
        }
        .player-item.active .stats-panel { max-height: 200px; border-top: 1px solid rgba(0, 242, 254, 0.1); }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); padding: 25px 40px; text-align: center; }
        .stat-value { display: block; font-family: 'Orbitron', sans-serif; font-size: 20px; font-weight: 700; margin-bottom: 5px; }
        .stat-label { font-size: 9px; color: #555; text-transform: uppercase; letter-spacing: 1px; }

        /* --- VACANCIES --- */
        .vacancy-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(0, 242, 254, 0.1);
            padding: 25px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            text-decoration: none;
            clip-path: polygon(0% 0%, 100% 0%, 100% 70%, 97% 100%, 0% 100%);
            transition: 0.3s;
        }
        .vacancy-card:hover { background: rgba(0, 242, 254, 0.05); border-color: var(--primary); transform: translateX(5px); }
        .v-title { font-family: 'Orbitron', sans-serif; font-size: 14px; color: #fff; letter-spacing: 1px; }
        .v-status { font-size: 9px; color: var(--primary); text-transform: uppercase; margin-top: 5px; display: flex; align-items: center; gap: 6px; }
        .pulse-dot { width: 5px; height: 5px; background: var(--primary); border-radius: 50%; animation: p 1.5s infinite; }
        @keyframes p { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }
        
        .apply-btn {
            background: transparent; border: 1px solid var(--primary); color: var(--primary);
            padding: 8px 20px; font-family: 'Orbitron', sans-serif; font-size: 10px;
            border-radius: 2px; text-transform: uppercase; transition: 0.3s;
        }
        .vacancy-card:hover .apply-btn { background: var(--primary); color: #000; box-shadow: 0 0 15px var(--accent-glow); }

        /* --- UTILS --- */
        .val-bad { color: var(--bad); }
        .val-okay { color: var(--okay); }
        .val-good { color: var(--good); }

        @media (max-width: 650px) {
            .stats-grid { grid-template-columns: repeat(2, 2fr); gap: 20px; }
            .player-header { padding: 25px; }
            .player-name-wrapper { margin-left: 40px; }
            .nickname { font-size: 18px; }
            .player-silhouette { width: 140px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header class="header">
        <img src="logo.PNG" class="logo-img">
        <h1 class="team-title">Ego</h1>
    </header>

    <div class="section-label">Active Units</div>

    <div class="player-item">
        <div class="player-silhouette"></div>
        <div class="player-header" onclick="toggleStats(this)">
            <div class="player-name-wrapper">
                <div class="nickname">
                    <img src="https://flagcdn.com/w40/ua.png" class="flag-img"> -himeraa666
                </div>
                <div class="role-text">IN-GAME LEADER & AWP</div>
            </div>
            <a href="https://www.faceit.com/ru/players/MrFlayz" target="_blank" class="faceit-link" onclick="event.stopPropagation()">
                <img src="faceit.png">
            </a>
        </div>
        <div class="stats-panel">
            <div class="stats-grid">
                <div class="stat-card"><span class="stat-value" data-type="kdr">1.26</span><span class="stat-label">K/D Ratio</span></div>
                <div class="stat-card"><span class="stat-value" data-type="adr">87.9</span><span class="stat-label">Avg Damage</span></div>
                <div class="stat-card"><span class="stat-value" data-type="hs">45%</span><span class="stat-label">Headshots</span></div>
                <div class="stat-card"><span class="stat-value" data-type="winrate">60%</span><span class="stat-label">Winrate</span></div>
            </div>
        </div>
    </div>

    <div class="player-item">
        <div class="player-silhouette"></div>
        <div class="player-header" onclick="toggleStats(this)">
            <div class="player-name-wrapper">
                <div class="nickname">
                    <img src="https://flagcdn.com/w40/ua.png" class="flag-img"> angeldust
                </div>
                <div class="role-text">RIFLER / ENTRY</div>
            </div>
            <a href="https://www.faceit.com/ru/players/9livesofhell" target="_blank" class="faceit-link" onclick="event.stopPropagation()">
                <img src="faceit.png">
            </a>
        </div>
        <div class="stats-panel">
            <div class="stats-grid">
                <div class="stat-card"><span class="stat-value" data-type="kdr">1.17</span><span class="stat-label">K/D Ratio</span></div>
                <div class="stat-card"><span class="stat-value" data-type="adr">89.4</span><span class="stat-label">Avg Damage</span></div>
                <div class="stat-card"><span class="stat-value" data-type="hs">46%</span><span class="stat-label">Headshots</span></div>
                <div class="stat-card"><span class="stat-value" data-type="winrate">46%</span><span class="stat-label">Winrate</span></div>
            </div>
        </div>
    </div>

    <div class="player-item" style="border-left-style: dashed; opacity: 0.6;">
        <div class="player-header">
            <div class="player-name-wrapper">
                <div class="nickname" style="color: #444;">Vacant_Slot</div>
                <div class="role-text">RECRUITING...</div>
            </div>
        </div>
    </div>

    <div class="section-label">Support Staff</div>

    <a href="#" class="vacancy-card">
        <div>
            <div class="v-title">Tactical Coach</div>
            <div class="v-status"><div class="pulse-dot"></div> Priority: High</div>
        </div>
        <div class="apply-btn">Apply</div>
    </a>

</div>

<script>
    function toggleStats(el) { el.parentElement.classList.toggle('active'); }

    function runColorizer() {
        const stats = document.querySelectorAll('.stat-value');
        stats.forEach(el => {
            const type = el.getAttribute('data-type');
            const val = parseFloat(el.textContent);
            if (type === 'kdr') {
                if (val < 1.0) el.classList.add('val-bad');
                else if (val <= 1.2) el.classList.add('val-okay');
                else el.classList.add('val-good');
            } else if (type === 'adr') {
                if (val < 75) el.classList.add('val-bad');
                else if (val <= 85) el.classList.add('val-okay');
                else el.classList.add('val-good');
            }
        });
    }
    window.addEventListener('DOMContentLoaded', runColorizer);
</script>
</body>
</html>
