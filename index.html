<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Team Ego | Roster</title>
    
    <link rel="icon" type="image/png" href="logo1.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00f2fe;
            --bg: #05070a;
            --card-bg: rgba(255, 255, 255, 0.02);
            --border: rgba(0, 242, 254, 0.15);
            --bad: #ff4b4b;
            --okay: #ffb800;
            --good: #00ff85;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1e2a3a 0%, transparent 50%);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            padding: 40px 20px;
        }

        .container { width: 100%; max-width: 850px; margin: 0 auto; }

        /* --- ШАПКА --- */
        .header { text-align: center; margin-bottom: 40px; }
        
        /* Основное лого (без черного квадрата) */
        .logo-img { 
            width: 180px; 
            height: auto;
            filter: drop-shadow(0 0 20px rgba(0, 242, 254, 0.5)); 
            margin-bottom: 10px;
            transition: 0.3s;
        }
        .logo-img:hover { transform: scale(1.05); filter: drop-shadow(0 0 30px var(--primary)); }

        .team-title {
            font-family: 'Orbitron', sans-serif; font-size: 36px; font-weight: 900;
            letter-spacing: 8px; text-transform: uppercase;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
        }

        .match-history-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 25px;
            background: rgba(0, 242, 254, 0.05);
            border: 1px solid var(--primary);
            border-radius: 30px;
            color: var(--primary);
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            letter-spacing: 2px;
            text-decoration: none;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .match-history-btn:hover { background: var(--primary); color: #000; box-shadow: 0 0 20px var(--primary); }

        /* --- СЕКЦИИ --- */
        .section-label {
            font-family: 'Orbitron', sans-serif; font-size: 13px; color: var(--primary);
            letter-spacing: 3px; margin: 40px 0 20px;
            display: flex; align-items: center; gap: 15px;
        }
        .section-label::after { content: ""; height: 1px; flex-grow: 1; background: linear-gradient(to right, var(--primary), transparent); opacity: 0.3; }

        /* --- КАРТОЧКА ИГРОКА --- */
        .player-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 12px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .player-item:hover {
            background: rgba(0, 242, 254, 0.05);
            border-color: rgba(0, 242, 254, 0.5);
            transform: translateX(5px);
        }

        .player-header { padding: 18px 25px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .player-info { display: flex; align-items: center; gap: 20px; }
        
        .avatar-box {
            width: 55px; height: 55px; background: rgba(0,0,0,0.4); 
            border: 1px solid rgba(255,255,255,0.05); border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
        }
        .avatar-box img { width: 65%; }

        .nickname { 
            font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 700; 
            display: flex; align-items: center; gap: 12px;
        }

        .flag-img { width: 22px; border-radius: 2px; }

        .role-badge {
            font-family: 'Orbitron', sans-serif; font-size: 10px;
            padding: 6px 16px; border-radius: 4px;
            border: 1px solid var(--primary); color: var(--primary);
            text-transform: uppercase;
        }

        /* --- ВАКАНТНЫЙ СЛОТ --- */
        .player-item.vacant { border: 1px dashed rgba(0, 242, 254, 0.3); background: transparent; }
        .vacant-ico { border: 1px dashed rgba(0, 242, 254, 0.4) !important; position: relative; }
        .vacant-ico::before { content: "+"; color: var(--primary); font-size: 24px; opacity: 0.5; }

        /* --- СТАТИСТИКА --- */
        .stats-panel { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; background: rgba(0,0,0,0.3); }
        .player-item.active .stats-panel { max-height: 300px; border-top: 1px solid rgba(0, 242, 254, 0.1); }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; padding: 20px; }
        .stat-card { text-align: center; }
        .stat-value { display: block; font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 900; }
        .stat-label { font-size: 9px; color: rgba(255,255,255,0.4); text-transform: uppercase; }

        /* --- ВАКАНСИИ ВНИЗУ --- */
        .vacancy-card {
            background: linear-gradient(90deg, rgba(0, 242, 254, 0.05), transparent);
            border: 1px solid rgba(0, 242, 254, 0.2);
            border-radius: 10px; padding: 25px;
            display: flex; align-items: center; justify-content: space-between;
            text-decoration: none; margin-bottom: 15px; transition: 0.3s;
        }
        .vacancy-card:hover { border-color: var(--primary); background: rgba(0, 242, 254, 0.1); }
        .v-btn {
            background: transparent; border: 1px solid var(--primary); color: var(--primary);
            padding: 8px 20px; font-family: 'Orbitron', sans-serif; font-size: 10px;
            border-radius: 4px; text-transform: uppercase;
        }

        @media (max-width: 600px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .vacancy-card { flex-direction: column; gap: 20px; text-align: center; }
        }
    </style>
</head>
<body>

<div class="container">
    <header class="header">
        <img src="logo.PNG" class="logo-img" alt="Team Ego Logo">
        <h1 class="team-title">Team Ego</h1>
        <a href="/history" class="match-history-btn">📊 Match History</a>
    </header>

    <div class="section-label">MAIN ROSTER</div>

    <div class="player-item">
        <div class="player-header" onclick="toggleStats(this)">
            <div class="player-info">
                <div class="avatar-box"><img src="avatar.PNG"></div>
                <div class="nickname">
                    <img src="https://flagcdn.com/w40/ua.png" class="flag-img"> -himeraa666
                </div>
            </div>
            <div class="role-badge">IGL / AWP</div>
        </div>
        <div class="stats-panel">
            <div class="stats-grid">
                <div class="stat-card"><span class="stat-value" style="color:var(--good)">1.26</span><span class="stat-label">K/D</span></div>
                <div class="stat-card"><span class="stat-value">87.9</span><span class="stat-label">ADR</span></div>
                <div class="stat-card"><span class="stat-value">45%</span><span class="stat-label">HS%</span></div>
                <div class="stat-card"><span class="stat-value" style="color:var(--good)">60%</span><span class="stat-label">Wins</span></div>
            </div>
        </div>
    </div>

    <a href="#" style="text-decoration: none;">
        <div class="player-item vacant">
            <div class="player-header">
                <div class="player-info">
                    <div class="avatar-box vacant-ico"></div>
                    <div class="nickname" style="color:rgba(255,255,255,0.3)">Vacant Slot</div>
                </div>
                <div class="role-badge" style="opacity: 0.3; border-style: dashed;">TBD</div>
            </div>
        </div>
    </a>

    <div class="section-label">STRATEGIC COACH</div>
    <a href="#" class="vacancy-card">
        <div>
            <div style="font-family:'Orbitron'; font-size:14px; color:#fff; margin-bottom:5px;">Analyzing tactical opportunities</div>
            <div style="font-size:10px; color:var(--primary); letter-spacing:2px;">● OPEN FOR APPLICATIONS</div>
        </div>
        <div class="v-btn">Become Coach</div>
    </a>

</div>

<script>
    function toggleStats(el) { el.parentElement.classList.toggle('active'); }
</script>
</body>
</html>
