<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Team Ego</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

  <style>
    /* ... (предыдущие стили без изменений до блока .avatar) ... */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #fff; font-family: 'Orbitron', sans-serif; display: flex; flex-direction: column; align-items: center; }
    .container { width: 100%; max-width: 900px; padding: 20px; }
    .hero { text-align: center; padding: 60px 0; }
    .logo { width: 140px; height: 140px; margin: 0 auto 20px; background: #111; border-radius: 16px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(0,255,200,0.2); transition: 0.3s; }
    .logo:hover { box-shadow: 0 0 30px rgba(0,255,200,0.4); transform: scale(1.05); }
    .logo img { width: 80%; height: 80%; object-fit: contain; }
    .team-name { font-size: 36px; letter-spacing: 4px; }
    .section-title { font-size: 18px; margin: 40px 0 20px; opacity: 0.7; }
    .player { display: flex; align-items: center; justify-content: space-between; background: #111; padding: 15px 20px; border-radius: 10px; margin-bottom: 12px; transition: 0.3s; }
    .player:hover { background: #141414; box-shadow: 0 0 10px rgba(0,255,200,0.15); }
    .player-left { display: flex; align-items: center; gap: 15px; }

    /* ОБНОВЛЕННЫЙ СТИЛЬ АВАТАРА */
    .avatar {
      width: 45px; /* Чуть увеличил для наглядности */
      height: 45px;
      background: transparent; /* Убрали серый фон */
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: contain; /* Чтобы силуэт не растягивался */
      filter: brightness(0.8); /* Можно подрегулировать яркость под стиль сайта */
    }

    .nickname { font-size: 16px; }
    .role { font-size: 12px; padding: 5px 10px; border-radius: 6px; background: rgba(0,255,200,0.1); border: 1px solid rgba(0,255,200,0.3); }
    .sub { margin-top: 40px; padding: 20px; border: 1px solid #222; border-radius: 10px; text-align: center; opacity: 0.7; }
    .fade-in { opacity: 0; transform: translateY(20px); animation: fadeIn 0.6s forwards; }
    @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 600px) { .team-name { font-size: 28px; } .player { flex-direction: column; align-items: flex-start; gap: 10px; } .role { align-self: flex-end; } }
  </style>
</head>

<body>
  <div class="container">

    <section class="hero fade-in">
      <div class="logo">
        <img src="logo.PNG" alt="Team Ego Logo">
      </div>
      <div class="team-name">TEAM EGO</div>
    </section>

    <div class="section-title">СОСТАВ</div>

    <div class="player fade-in">
      <div class="player-left">
        <div class="avatar">
          <img src="avatar.png" alt="player">
        </div>
        <div class="nickname">himeraa666</div>
      </div>
      <div class="role">IGL / AWP</div>
    </div>

    <div class="player fade-in">
      <div class="player-left">
        <div class="avatar">
          <img src="avatar.png" alt="player">
        </div>
        <div class="nickname">angeldust</div>
      </div>
      <div class="role">RIFLE</div>
    </div>

    <div class="player fade-in">
      <div class="player-left">
        <div class="avatar">
          <img src="avatar.png" alt="player">
        </div>
        <div class="nickname">lanes</div>
      </div>
      <div class="role">SUPPORT</div>
    </div>

    <div class="player fade-in">
      <div class="player-left">
        <div class="avatar">
          <img src="avatar.png" alt="player">
        </div>
        <div class="nickname">aimlord</div>
      </div>
      <div class="role">LURKER</div>
    </div>

    <div class="player fade-in">
      <div class="player-left">
        <div class="avatar">
          <img src="avatar.png" alt="player">
        </div>
        <div class="nickname">SOON...</div>
      </div>
      <div class="role">---</div>
    </div>

    <div class="section-title">ЗАМЕНЫ</div>
    <div class="sub fade-in">SOON...</div>

  </div>
</body>
</html>
