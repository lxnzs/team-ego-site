<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
    
    <title>Team Ego | Roster & Stats</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00f2fe;
            --bg: #05070a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --bad: #ff4b4b;
            --okay: #ffb800;
            --good: #00ff85;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1e2a3a 0%, transparent 50%);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            padding: 40px 20px;
        }

        .container { width: 100%; max-width: 800px; margin: 0 auto; }

        .header { text-align: center; margin-bottom: 60px; }
        .logo-img { width: 120px; filter: drop-shadow(0 0 10px var(--primary)); margin-bottom: 10px; }
        .team-title {
            font-family: 'Orbitron', sans-serif; font-size: 36px; font-weight: 900;
            letter-spacing: 6px; text-transform: uppercase;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .section-label {
            font-family: 'Orbitron', sans-serif; font-size: 14px; color: var(--primary);
            letter-spacing: 3px; margin: 30px 0 20px;
            display: flex; align-items: center; gap: 15px;
        }
        .section-label::after { content: ""; height: 1px; flex-grow: 1; background: linear-gradient(to right, var(--primary), transparent); }

        .player-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            margin-bottom: 15px;
            overflow: hidden;
            transition: 0.3s;
        }

        .player-header { padding: 20px 30px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .player-header:hover { background: rgba(255,255,255,0.05); }
        .no-click { cursor: default !important; pointer-events: none; }

        .player-info { display: flex; align-items: center; gap: 15px; flex: 1; min-width: 0; }
        .avatar-box {
            width: 50px; height: 50px; background: #111; border-radius: 10px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
        }
        .avatar-box img { width: 70%; filter: brightness(0) invert(1); }

        .nickname { 
            font-family: 'Orbitron', sans-serif; 
            font-size: 18px; 
            font-weight: 700; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            white-space: nowrap;
        }

        /* Стиль для новых флагов-картинок */
        .flag-img {
            width: 24px; /* Ширина флага */
            height: auto;
            border-radius: 2px; /* Легкое закругление */
            box-shadow: 0 0 5px rgba(0,0,0,0.5); /* Тень для объема */
            flex-shrink: 0;
        }
        
        .faceit-link { display: flex; align-items: center; transition: 0.2s; flex-shrink: 0; }
        .faceit-link:hover { opacity: 0.8; transform: scale(1.15); }
        .faceit-ico { width: 26px; height: auto; display: block; }

        .role-badge {
            font-family: 'Orbitron', sans-serif; font-size: 10px;
            padding: 5px 12px; border-radius: 20px;
            border: 1px solid var(--primary); color: var(--primary);
            flex-shrink: 0;
        }

        .stats-panel { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; background: rgba(0,0,0,0.2); }
        .player-item.active .stats-panel { max-height: 300px; border-top: 1px solid var(--border); }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 20px; }
        .stat-card { text-align: center; background: rgba(255,255,255,0.02); padding: 10px; border-radius: 8px; }
        
        .stat-value { 
            display: block; 
            font-family: 'Orbitron', sans-serif; 
            font-size: 18px; 
            font-weight: 900;
            color: #fff !important;
        }
        
        .stat-label { font-size: 9px; color: #666; text-transform: uppercase; }

        .val-bad { color: var(--bad) !important; }
        .val-okay { color: var(--okay) !important; }
        .val-good { color: var(--good) !important; }

        .sub-box {
            text-align: center; padding: 40px;
            border: 2px dashed var(--border); border-radius: 166px;
            color: rgba(255,255,255,0.2); font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px; font-size: 12px;
        }

        /* --- МОБИЛЬНАЯ АДАПТАЦИЯ --- */
        @media (max-width: 600px) {
            body { padding: 20px 15px; }
            .header { margin-bottom: 40px; }
            .team-title { font-size: 26px; letter-spacing: 3px; }
            .player-header { padding: 15px 15px; }
            .avatar-box { width: 42px; height: 42px; }
            .nickname { font-size: 15px; gap: 10px; } 
            .flag-img { width: 18px; } /* Уменьшили флаг на телефоне */
            .faceit-ico { width: 20px; }
            .role-badge { font-size: 8px; padding: 4px 8px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); padding: 12px; gap: 8px; }
            .stat-value { font-size: 16px; }
        }
    </style>
</head>
<body>

                <div class="nickname">
                    <img src="https://flagcdn.com/w40/ua.png" class="flag-img" alt="UA"> angeldust
                    <a href="https://www.faceit.com/ru/players/9livesofhell" target="_blank" class="faceit-link" onclick="event.stopPropagation()">
                        <img src="faceit.png" class="faceit-ico">
                    </a>
                </div>
            </div>

        </div>
        <div class="stats-panel"><div class="stats-grid">
            <div class="stat-card"><span class="stat-value" data-type="kdr">1.17</span><span class="stat-label">K/D</span></div>
            <div class="stat-card"><span class="stat-value" data-type="adr">89.4</span><span class="stat-label">ADR</span></div>
            <div class="stat-card"><span class="stat-value" data-type="hs">46%</span><span class="stat-label">HS%</span></div>

<script>
    function toggleStats(el) { el.parentElement.classList.toggle('active'); }

    function runColorizer() {
        const stats = document.querySelectorAll('.stat-value');
        stats.forEach(el => {
            const type = el.getAttribute('data-type');
            if (!type) return;
            const val = parseFloat(el.textContent.replace('%', ''));
            el.classList.remove('val-bad', 'val-okay', 'val-good');

            if (type === 'kdr') {
                if (val < 1.0) el.classList.add('val-bad');
                else if (val <= 1.2) el.classList.add('val-okay');
                else el.classList.add('val-good');
            } else if (type === 'adr') {
                if (val < 75) el.classList.add('val-bad');
                else if (val <= 85) el.classList.add('val-okay');
                else el.classList.add('val-good');
            } else if (type === 'hs' || type === 'winrate') {
                if (val < 45) el.classList.add('val-bad');
                else if (val <= 55) el.classList.add('val-okay');
                else el.classList.add('val-good');
            }
        });
    }

    window.addEventListener('DOMContentLoaded', runColorizer);
    window.addEventListener('load', runColorizer);

    const observer = new MutationObserver(() => {
        observer.disconnect();
        runColorizer();
        startObserving();
    });

    function startObserving() {
        observer.observe(document.body, { childList: true, subtree: true, characterData: true });
    }
    startObserving();
</script>
</body>
