<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no">
    <title>Team Ego | Roster</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00f2fe;
            --bg: #05070a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            /* Цвета для статов */
            --bad: #ff4b4b;
            --okay: #ffb800;
            --good: #00ff85;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1e2a3a 0%, transparent 50%);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            padding: 40px 20px;
        }

        .container { width: 100%; max-width: 800px; margin: 0 auto; }

        .header { text-align: center; margin-bottom: 60px; }
        .logo-img { width: 120px; filter: drop-shadow(0 0 10px var(--primary)); margin-bottom: 10px; }
        .team-title {
            font-family: 'Orbitron', sans-serif; font-size: 36px; font-weight: 900;
            letter-spacing: 6px; text-transform: uppercase;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .section-label {
            font-family: 'Orbitron', sans-serif; font-size: 14px; color: var(--primary);
            letter-spacing: 3px; margin: 30px 0 20px;
            display: flex; align-items: center; gap: 15px;
        }
        .section-label::after { content: ""; height: 1px; flex-grow: 1; background: linear-gradient(to right, var(--primary), transparent); }

        .player-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .player-header { padding: 20px 30px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .no-click { cursor: default !important; pointer-events: none; }

        .player-info { display: flex; align-items: center; gap: 15px; }
        .avatar-box {
            width: 50px; height: 50px; background: #111; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
        }
        .avatar-box img { width: 70%; filter: brightness(0) invert(1); }

        .nickname { font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 700; }
        .role-badge {
            font-family: 'Orbitron', sans-serif; font-size: 10px;
            padding: 5px 12px; border-radius: 20px;
            border: 1px solid var(--primary); color: var(--primary);
        }

        .stats-panel { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; background: rgba(0,0,0,0.2); }
        .player-item.active .stats-panel { max-height: 300px; border-top: 1px solid var(--border); }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 20px; }
        .stat-card { text-align: center; background: rgba(255,255,255,0.02); padding: 10px; border-radius: 8px; }
        
        /* Принудительный сброс цвета для телефонов */
        .stat-value { 
            display: block; 
            font-family: 'Orbitron', sans-serif; 
            font-size: 18px; 
            font-weight: 900;
            text-decoration: none !important;
        }
        
        .stat-label { font-size: 9px; color: #666; text-transform: uppercase; }

        /* Классы для ручной раскраски */
        .txt-bad { color: var(--bad) !important; }
        .txt-okay { color: var(--okay) !important; }
        .txt-good { color: var(--good) !important; }

        .sub-box {
            text-align: center; padding: 40px;
            border: 2px dashed var(--border); border-radius: 16px;
            color: rgba(255,255,255,0.2); font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px; font-size: 12px;
        }

        @media (max-width: 600px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .team-title { font-size: 28px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header class="header">
        <img src="logo.PNG" class="logo-img">
        <h1 class="team-title">Team Ego</h1>
    </header>

    <div class="section-label">MAIN ROSTER</div>

    <div class="player-item">
        <div class="player-header" onclick="toggleStats(this)">
            <div class="player-info">
                <div class="avatar-box"><img src="avatar.PNG"></div>
                <div class="nickname">himeraa666</div>
            </div>
            <div class="role-badge">IGL / AWP</div>
        </div>
        <div class="stats-panel"><div class="stats-grid">
            <div class="stat-card"><span class="stat-value txt-good">1.26</span><span class="stat-label">K/D</span></div>
            <div class="stat-card"><span class="stat-value txt-good">87.9</span><span class="stat-label">ADR</span></div>
            <div class="stat-card"><span class="stat-value txt-okay">45%</span><span class="stat-label">HS%</span></div>
            <div class="stat-card"><span class="stat-value txt-good">60%</span><span class="stat-label">Wins</span></div>
        </div></div>
    </div>

    <div class="player-item">
        <div class="player-header" onclick="toggleStats(this)">
            <div class="player-info">
                <div class="avatar-box"><img src="avatar.PNG"></div>
                <div class="nickname">angeldust</div>
            </div>
            <div class="role-badge">RIFLE</div>
        </div>
        <div class="stats-panel"><div class="stats-grid">
            <div class="stat-card"><span class="stat-value txt-bad">0.95</span><span class="stat-label">K/D</span></div>
            <div class="stat-card"><span class="stat-value txt-bad">72.5</span><span class="stat-label">ADR</span></div>
            <div class="stat-card"><span class="stat-value txt-okay">52%</span><span class="stat-label">HS%</span></div>
            <div class="stat-card"><span class="stat-value txt-bad">48%</span><span class="stat-label">Wins</span></div>
        </div></div>
    </div>

    <div class="player-item">
        <div class="player-header" onclick="toggleStats(this)">
            <div class="player-info">
                <div class="avatar-box"><img src="avatar.PNG"></div>
                <div class="nickname">lanes</div>
            </div>
            <div class="role-badge">SUPPORT</div>
        </div>
        <div class="stats-panel"><div class="stats-grid">
            <div class="stat-card"><span class="stat-value txt-okay">1.05</span><span class="stat-label">K/D</span></div>
            <div class="stat-card"><span class="stat-value txt-okay">78.2</span><span class="stat-label">ADR</span></div>
            <div class="stat-card"><span class="stat-value txt-bad">38%</span><span class="stat-label">HS%</span></div>
            <div class="stat-card"><span class="stat-value txt-okay">55%</span><span class="stat-label">Wins</span></div>
        </div></div>
    </div>

    <div class="player-item">
        <div class="player-header" onclick="toggleStats(this)">
            <div class="player-info">
                <div class="avatar-box"><img src="avatar.PNG"></div>
                <div class="nickname">aimlord</div>
            </div>
            <div class="role-badge">LURKER</div>
        </div>
        <div class="stats-panel"><div class="stats-grid">
            <div class="stat-card"><span class="stat-value txt-good">1.35</span><span class="stat-label">K/D</span></div>
            <div class="stat-card"><span class="stat-value txt-good">92.1</span><span class="stat-label">ADR</span></div>
            <div class="stat-card"><span class="stat-value txt-good">58%</span><span class="stat-label">HS%</span></div>
            <div class="stat-card"><span class="stat-value txt-good">62%</span><span class="stat-label">Wins</span></div>
        </div></div>
    </div>

    <div class="player-item">
        <div class="player-header no-click">
            <div class="player-info">
                <div class="avatar-box"><img src="avatar.PNG"></div>
                <div class="nickname">SOON...</div>
            </div>
            <div class="role-badge" style="opacity: 0.5;">TBD</div>
        </div>
    </div>

    <div class="section-label">SUBSTITUTES</div>
    <div class="sub-box">SEARCHING FOR TALENTS...</div>
</div>

<script>
    function toggleStats(el) { el.parentElement.classList.toggle('active'); }
</script>
</body>
</html>
