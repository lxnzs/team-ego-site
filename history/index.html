<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Team Ego | Match History</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00f2fe;
            --bg: #05070a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --modal-bg: #0b0e13;
            --border: rgba(255, 255, 255, 0.1);
            --bad: #ff4b4b;
            --good: #00ff85;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1e2a3a 0%, transparent 50%);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 800px; margin: 0 auto; }

        /* --- ШАПКА --- */
        .header { text-align: center; margin-bottom: 40px; }
        .logo-img { width: 180px; filter: drop-shadow(0 0 15px rgba(0, 242, 254, 0.6)); margin-bottom: 15px; }
        
        .team-title {
            font-family: 'Orbitron', sans-serif; font-size: 32px; font-weight: 900;
            letter-spacing: 4px; text-transform: uppercase;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
        }

        .back-btn {
            display: inline-flex; align-items: center; gap: 10px;
            padding: 10px 25px; background: rgba(0, 242, 254, 0.05);
            border: 1px solid var(--primary); border-radius: 30px;
            color: var(--primary); font-family: 'Orbitron', sans-serif;
            font-size: 10px; letter-spacing: 2px; text-decoration: none;
            text-transform: uppercase; transition: 0.3s;
        }

        /* --- СПИСОК МАТЧЕЙ --- */
        .section-label {
            font-family: 'Orbitron', sans-serif; font-size: 13px; color: var(--primary);
            letter-spacing: 3px; margin: 40px 0 20px; display: flex; align-items: center; gap: 15px;
        }
        .section-label::after { content: ""; height: 1px; flex-grow: 1; background: linear-gradient(to right, var(--primary), transparent); }

        .match-row {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 16px; padding: 20px 25px; margin-bottom: 12px;
            display: flex; align-items: center; justify-content: space-between;
            cursor: pointer; transition: 0.2s;
        }
        .match-row:hover { background: rgba(255,255,255,0.06); transform: scale(1.01); }

        .match-main { display: flex; align-items: center; gap: 15px; }
        .win-tag { font-family: 'Orbitron'; font-size: 10px; color: var(--good); border: 1px solid var(--good); padding: 4px 8px; border-radius: 4px; }
        
        .match-teams { font-family: 'Orbitron'; font-size: 16px; font-weight: 700; }
        .ego-highlight { color: var(--primary); }
        .vs-text { color: #555; font-size: 12px; margin: 0 5px; }

        .match-result { text-align: right; font-family: 'Orbitron'; }
        .score { font-size: 18px; font-weight: 900; color: var(--good); display: block; }
        .map-name { font-size: 9px; color: #555; text-transform: uppercase; letter-spacing: 1px; }

        /* --- МОДАЛЬНОЕ ОКНО --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; /* Скрыто по умолчанию */
            justify-content: center; align-items: center; z-index: 1000;
            padding: 20px; backdrop-filter: blur(5px);
        }

        .modal-content {
            background: var(--modal-bg); border: 1px solid var(--border);
            width: 100%; max-width: 800px; border-radius: 24px;
            position: relative; animation: modalSlide 0.3s ease-out;
            max-height: 90vh; overflow-y: auto;
        }

        @keyframes modalSlide { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .modal-close {
            position: absolute; top: 20px; right: 20px;
            font-size: 24px; color: #555; cursor: pointer; transition: 0.2s;
        }
        .modal-close:hover { color: #fff; }

        .modal-header { padding: 40px 20px 20px; text-align: center; border-bottom: 1px solid var(--border); }
        .modal-score { font-family: 'Orbitron'; font-size: 42px; font-weight: 900; color: var(--good); line-height: 1; margin-bottom: 10px; }
        .modal-teams { font-family: 'Orbitron'; font-size: 14px; letter-spacing: 1px; color: #888; text-transform: uppercase; }
        .modal-teams b { color: var(--primary); }
        .modal-map { font-family: 'Orbitron'; font-size: 11px; color: var(--primary); margin-top: 10px; display: block; }

        /* Таблицы в модалке */
        .stats-box { padding: 20px; }
        .team-label { 
            background: rgba(255,255,255,0.03); padding: 8px 15px; 
            font-family: 'Orbitron'; font-size: 11px; color: #fff; 
            border-left: 3px solid var(--primary); margin: 20px 0 10px;
        }

        .stats-table { width: 100%; border-collapse: collapse; min-width: 500px; }
        .stats-table th { text-align: left; padding: 10px; font-family: 'Orbitron'; font-size: 9px; color: #444; border-bottom: 1px solid var(--border); }
        .stats-table td { padding: 12px 10px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.02); }
        
        .nick { font-family: 'Orbitron'; font-weight: 700; color: #fff; }
        .val { font-family: 'Orbitron'; text-align: center; }

        /* Мобилка */
        @media (max-width: 600px) {
            .match-teams { font-size: 13px; }
            .score { font-size: 16px; }
            .modal-score { font-size: 32px; }
            .stats-scroll { overflow-x: auto; }
        }
    </style>
</head>
<body>

<div class="container">
    <header class="header">
        <a href="/"><img src="/logo.PNG" class="logo-img"></a>
        <h1 class="team-title">Match History</h1>
        <a href="/" class="back-btn">← Back to Roster</a>
    </header>

    <div class="section-label">LATEST MATCHES</div>

    <div class="match-row" onclick="openModal()">
        <div class="match-main">
            <div class="win-tag">WIN</div>
            <div class="match-teams">
                <span class="ego-highlight">TEAM EGO</span>
                <span class="vs-text">vs</span>
                <span>NAVI JUNIOR</span>
            </div>
        </div>
        <div class="match-result">
            <span class="score">13 : 10</span>
            <span class="map-name">Ancient</span>
        </div>
    </div>
</div>

<div class="modal-overlay" id="matchModal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="modal-close" onclick="closeModal(event)">×</span>
        
        <div class="modal-header">
            <div class="modal-score">13:10</div>
            <div class="modal-teams"><b>TEAM EGO</b> vs NAVI JUNIOR</div>
            <span class="modal-map">ANCIENT</span>
        </div>

        <div class="stats-box">
            <div class="team-label">TEAM EGO</div>
            <div class="stats-scroll">
                <table class="stats-table">
                    <thead>
                        <tr>
                            <th>PLAYER</th>
                            <th style="text-align:center">K</th>
                            <th style="text-align:center">D</th>
                            <th style="text-align:center">ADR</th>
                            <th style="text-align:center">HS%</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="nick">himeraa</td>
                            <td class="val">22</td>
                            <td class="val">14</td>
                            <td class="val">95.2</td>
                            <td class="val">45%</td>
                        </tr>
                        <tr>
                            <td class="nick">angeldust</td>
                            <td class="val">19</td>
                            <td class="val">15</td>
                            <td class="val">88.0</td>
                            <td class="val">52%</td>
                        </tr>
                        </tbody>
                </table>
            </div>

            <div class="team-label" style="border-left-color: #555;">NAVI JUNIOR</div>
            <div class="stats-scroll">
                <table class="stats-table">
                    <tbody>
                        <tr>
                            <td class="nick" style="color:#777">Enemy</td>
                            <td class="val">15</td>
                            <td class="val">15</td>
                            <td class="val">75.0</td>
                            <td class="val">40%</td>
                        </tr>
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    function openModal() {
        document.getElementById('matchModal').style.display = 'flex';
        document.body.style.overflow = 'hidden'; // Запрет прокрутки фона
    }

    function closeModal(e) {
        document.getElementById('matchModal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }
</script>

</body>
</html>
