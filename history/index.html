<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
    
    <title>Team Ego | Match History</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00f2fe;
            --bg: #05070a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --bad: #ff4b4b;
            --okay: #ffb800;
            --good: #00ff85;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1e2a3a 0%, transparent 50%);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            padding: 40px 20px;
        }

        .container { width: 100%; max-width: 800px; margin: 0 auto; }

        /* --- ШАПКА (КОПИЯ ГЛАВНОГО МЕНЮ) --- */
        .header { text-align: center; margin-bottom: 40px; }
        
        /* Глаз: теперь точно такие же стили и обертка */
        .logo-img { 
            width: 180px; 
            height: auto;
            filter: drop-shadow(0 0 15px rgba(0, 242, 254, 0.6));
            margin-bottom: 15px; 
            transition: 0.2s ease;
            cursor: pointer;
        }
        .logo-img:hover {
            filter: drop-shadow(0 0 25px rgba(0, 242, 254, 0.9));
            transform: scale(1.05);
        }
        .logo-img:active { transform: scale(0.95); }

        .team-title {
            font-family: 'Orbitron', sans-serif; font-size: 36px; font-weight: 900;
            letter-spacing: 6px; text-transform: uppercase;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        /* --- КНОПКА НАЗАД (СТИЛЬ КАК У ИСТОРИИ) --- */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 25px;
            background: rgba(0, 242, 254, 0.05);
            border: 1px solid var(--primary);
            border-radius: 30px;
            color: var(--primary);
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            letter-spacing: 2px;
            text-decoration: none;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }
        .back-btn:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.4);
            transform: translateY(-2px);
        }

        /* --- РАЗДЕЛ --- */
        .section-label {
            font-family: 'Orbitron', sans-serif; font-size: 14px; color: var(--primary);
            letter-spacing: 3px; margin: 30px 0 20px;
            display: flex; align-items: center; gap: 15px;
        }
        .section-label::after { content: ""; height: 1px; flex-grow: 1; background: linear-gradient(to right, var(--primary), transparent); }

        /* --- КАРТОЧКА МАТЧА (СТИЛЬ КАК У ИГРОКА) --- */
        .match-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            margin-bottom: 15px;
            overflow: hidden;
            transition: 0.3s;
        }

        .match-header { 
            padding: 20px 30px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            cursor: pointer; 
        }
        .match-header:hover { background: rgba(255,255,255,0.05); }

        .match-info { display: flex; align-items: center; gap: 15px; flex: 1; }
        
        .win-indicator {
            width: 10px; height: 10px; background: var(--good); border-radius: 50%;
            box-shadow: 0 0 10px var(--good);
        }

        .match-details { font-family: 'Orbitron', sans-serif; }
        .opponent-name { font-size: 18px; font-weight: 700; display: block; }
        .match-map { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 2px; }

        .score-badge {
            font-family: 'Orbitron', sans-serif; font-size: 16px; font-weight: 900;
            padding: 8px 15px; border-radius: 10px;
            background: rgba(0, 255, 133, 0.1); border: 1px solid var(--good); color: var(--good);
        }

        /* --- СТАТИСТИКА МАТЧА (ВЫПАДАЮЩАЯ) --- */
        .match-stats-panel { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; background: rgba(0,0,0,0.2); }
        .match-item.active .match-stats-panel { max-height: 1000px; border-top: 1px solid var(--border); }
        
        .stats-table { width: 100%; border-collapse: collapse; color: #fff; }
        .stats-table th { 
            text-align: left; padding: 15px 20px; font-family: 'Orbitron'; 
            font-size: 10px; color: #555; border-bottom: 1px solid var(--border);
        }
        .stats-table td { padding: 12px 20px; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .stats-table tr:last-child td { border-bottom: none; }
        
        .p-name { font-family: 'Orbitron'; font-weight: 700; }
        .p-stat { font-family: 'Orbitron'; font-weight: 900; text-align: center; }

        /* Адаптация */
        @media (max-width: 600px) {
            .logo-img { width: 110px; }
            .team-title { font-size: 26px; }
            .match-header { padding: 15px; }
            .opponent-name { font-size: 15px; }
            .score-badge { font-size: 14px; padding: 5px 10px; }
            .stats-table td, .stats-table th { padding: 10px; font-size: 12px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header class="header">
        <a href="/"><img src="/logo.PNG" class="logo-img" title="На главную"></a>
        <h1 class="team-title">Team Ego</h1>
        
        <a href="/" class="back-btn">
            <span>←</span> Back to Home
        </a>
    </header>

    <div class="section-label">LATEST MATCH</div>

    <div class="match-item">
        <div class="match-header" onclick="toggleStats(this)">
            <div class="match-info">
                <div class="win-indicator"></div>
                <div class="match-details">
                    <span class="opponent-name">NAVI JUNIOR</span>
                    <span class="match-map">Ancient</span>
                </div>
            </div>
            <div class="score-badge">13 : 10</div>
        </div>
        
        <div class="match-stats-panel">
            <table class="stats-table">
                <thead>
                    <tr>
                        <th>PLAYER</th>
                        <th style="text-align:center">K/D</th>
                        <th style="text-align:center">ADR</th>
                        <th style="text-align:center">HS%</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="p-name">-himeraa666</td>
                        <td class="p-stat" style="color:var(--good)">1.45</td>
                        <td class="p-stat">95.2</td>
                        <td class="p-stat">45%</td>
                    </tr>
                    <tr>
                        <td class="p-name">angeldust</td>
                        <td class="p-stat" style="color:var(--good)">1.20</td>
                        <td class="p-stat">88.4</td>
                        <td class="p-stat">52%</td>
                    </tr>
                    <tr>
                        <td class="p-name">lanes</td>
                        <td class="p-stat" style="color:var(--okay)">1.05</td>
                        <td class="p-stat">76.1</td>
                        <td class="p-stat">35%</td>
                    </tr>
                    <tr>
                        <td class="p-name">aimlord</td>
                        <td class="p-stat" style="color:var(--bad)">0.85</td>
                        <td class="p-stat">62.3</td>
                        <td class="p-stat">65%</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Функция открытия статистики как на главной
    function toggleStats(el) { 
        el.parentElement.classList.toggle('active'); 
    }
</script>

</body>
</html>
