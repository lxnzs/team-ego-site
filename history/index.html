<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Team Ego | Match History</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00f2fe;
            --bg: #05070a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --bad: #ff4b4b;
            --good: #00ff85;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1e2a3a 0%, transparent 50%);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            padding: 40px 15px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container { 
            width: 100%; 
            max-width: 800px; 
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center; /* Строго центрируем всё содержимое */
        }

        /* --- ШАПКА (ЖЕСТКАЯ ЦЕНТРОВКА) --- */
        .header { 
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
        }
        
        .logo-img { 
            width: 180px; 
            height: auto;
            filter: drop-shadow(0 0 15px rgba(0, 242, 254, 0.6));
            margin-bottom: 15px; 
            display: block;
        }

        .team-title {
            font-family: 'Orbitron', sans-serif; font-size: clamp(24px, 8vw, 36px); font-weight: 900;
            letter-spacing: 6px; text-transform: uppercase;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
            text-align: center;
        }

        .back-btn {
            display: inline-flex; align-items: center;
            padding: 10px 25px; background: rgba(0, 242, 254, 0.05);
            border: 1px solid var(--primary); border-radius: 30px;
            color: var(--primary); font-family: 'Orbitron', sans-serif;
            font-size: 11px; letter-spacing: 2px; text-decoration: none;
            text-transform: uppercase; transition: 0.3s;
        }

        /* --- КАРТОЧКИ --- */
        .section-label {
            width: 100%;
            font-family: 'Orbitron', sans-serif; font-size: 13px; color: var(--primary);
            letter-spacing: 3px; margin: 30px 0 20px; display: flex; align-items: center; gap: 15px;
        }
        .section-label::after { content: ""; height: 1px; flex-grow: 1; background: linear-gradient(to right, var(--primary), transparent); }

        .match-item {
            width: 100%;
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 16px; padding: 20px; margin-bottom: 12px;
            display: flex; align-items: center; justify-content: space-between;
            cursor: pointer; transition: 0.2s;
        }

        /* --- МОДАЛЬНОЕ ОКНО --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(15px);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-overlay.active { display: flex; }

        .modal-window {
            background: #0a0e14; width: 95%; max-width: 900px;
            border: 1px solid var(--border); border-radius: 20px;
            position: relative; max-height: 90vh; overflow-y: auto;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-header {
            padding: 35px 20px; text-align: center;
            border-bottom: 1px solid var(--border);
        }

        /* Новый стиль заголовка по твоему запросу */
        .m-score-main { 
            font-family: 'Orbitron', sans-serif; 
            font-size: 42px; 
            font-weight: 900; 
            line-height: 1;
            margin-bottom: 10px;
        }
        .m-teams-row {
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .m-teams-row span { color: var(--primary); }
        .m-map-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            color: var(--primary);
            margin-top: 15px;
            letter-spacing: 4px;
            opacity: 0.8;
        }

        .close-btn { position: absolute; top: 20px; right: 20px; font-size: 24px; color: #444; cursor: pointer; }

        .modal-body { padding: 20px; }
        .team-block-title { 
            background: rgba(255,255,255,0.03); padding: 10px 15px; 
            font-family: 'Orbitron'; font-size: 12px; margin: 15px 0;
            border-left: 3px solid var(--primary);
        }

        .stats-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .stats-table th { color: #555; font-family: 'Orbitron'; font-size: 10px; padding: 10px; text-align: left; border-bottom: 1px solid var(--border); }
        .stats-table td { padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,0.02); }

        /* Мобильная адаптация */
        @media (max-width: 600px) {
            .m-score-main { font-size: 32px; }
            .m-teams-row { font-size: 13px; }
            .stats-table { font-size: 11px; }
            .stats-table th, .stats-table td { padding: 8px 5px; }
            .match-item { flex-direction: column; gap: 10px; text-align: center; }
        }
    </style>
</head>
<body>

<div class="container">
    <header class="header">
        <img src="/logo.PNG" class="logo-img">
        <h1 class="team-title">Team Ego</h1>
        <a href="/" class="back-btn">← Back to Roster</a>
    </header>

    <div class="section-label">MATCH HISTORY</div>

    <div class="match-item" onclick="openMatch('NAVI JUNIOR', '13:10', 'Ancient', true)">
        <div style="display:flex; align-items:center; gap:15px;">
            <div style="color:var(--good); font-family:'Orbitron'; font-weight:900; font-size:10px; border:1px solid var(--good); padding:3px 8px; border-radius:4px;">WIN</div>
            <div style="font-family:'Orbitron'; font-size:14px;">TEAM EGO <span style="color:rgba(255,255,255,0.2)">vs</span> NAVI JUNIOR</div>
        </div>
        <div style="text-align:right">
            <div style="font-family:'Orbitron'; font-weight:900; color:var(--good)">13:10</div>
            <div style="font-size:9px; opacity:0.3; text-transform:uppercase;">Ancient</div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modal">
    <div class="modal-window">
        <span class="close-btn" onclick="closeMatch()">&times;</span>
        
        <div class="modal-header">
            <div id="mScore" class="m-score-main">13 : 10</div>
            <div class="m-teams-row">
                <span>TEAM EGO</span> <small style="margin:0 10px; opacity:0.3">VS</small> <b id="mOpponent">ENEMY</b>
            </div>
            <div id="mMap" class="m-map-name">ANCIENT</div>
        </div>

        <div class="modal-body">
            <div class="team-block-title">TEAM EGO</div>
            <table class="stats-table">
                <thead><tr><th>PLAYER</th><th>K</th><th>D</th><th>ADR</th><th>HS%</th></tr></thead>
                <tbody id="egoTable"></tbody>
            </table>

            <div class="team-block-title" id="oppTitle" style="border-left-color:#444;">OPPONENT</div>
            <table class="stats-table">
                <thead><tr><th>PLAYER</th><th>K</th><th>D</th><th>ADR</th><th>HS%</th></tr></thead>
                <tbody id="oppTable"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    function openMatch(opp, score, map, isWin) {
        document.getElementById('mScore').innerText = score;
        document.getElementById('mScore').style.color = isWin ? 'var(--good)' : 'var(--bad)';
        document.getElementById('mOpponent').innerText = opp;
        document.getElementById('oppTitle').innerText = opp;
        document.getElementById('mMap').innerText = map.toUpperCase();

        // Пример данных
        const egoPlayers = [
            ["himeraa", 22, 14, 95.2, "45%"],
            ["angeldust", 19, 15, 88.0, "52%"],
            ["lanes", 14, 18, 72.4, "38%"],
            ["aimlord", 11, 20, 65.1, "60%"],
            ["soon...", 0, 0, 0.0, "0%"]
        ];

        renderTable('egoTable', egoPlayers);
        renderTable('oppTable', egoPlayers.map(p => ["Enemy", 15, 15, 75.0, "40%"]));

        document.getElementById('modal').classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function renderTable(id, data) {
        const t = document.getElementById(id);
        t.innerHTML = data.map(p => `
            <tr>
                <td style="font-weight:700">${p[0]}</td>
                <td style="font-family:'Orbitron'">${p[1]}</td>
                <td style="font-family:'Orbitron'">${p[2]}</td>
                <td>${p[3]}</td>
                <td>${p[4]}</td>
            </tr>
        `).join('');
    }

    function closeMatch() {
        document.getElementById('modal').classList.remove('active');
        document.body.style.overflow = 'auto';
    }

    // Закрытие по клику на фон
    window.onclick = function(event) {
        if (event.target == document.getElementById('modal')) closeMatch();
    }
</script>

</body>
</html>
