<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Team Ego | Match History</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00f2fe;
            --bg: #05070a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --bad: #ff4b4b;
            --good: #00ff85;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1e2a3a 0%, transparent 50%);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 800px; margin: 0 auto; }

        .header { text-align: center; margin-bottom: 50px; }
        
        .logo-img { 
            width: 180px; 
            filter: drop-shadow(0 0 15px rgba(0, 242, 254, 0.6));
            margin-bottom: 15px; 
            transition: 0.3s ease;
            cursor: pointer;
        }
        .logo-img:hover { transform: scale(1.05); filter: drop-shadow(0 0 25px var(--primary)); }

        .section-label {
            font-family: 'Orbitron', sans-serif; font-size: 14px; color: var(--primary);
            letter-spacing: 3px; margin: 30px 0 25px;
            display: flex; align-items: center; gap: 15px;
            text-transform: uppercase;
        }
        .section-label::after { content: ""; height: 1px; flex-grow: 1; background: linear-gradient(to right, var(--primary), transparent); }

        .match-item {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: 0.3s;
            animation: fadeIn 0.5s ease backwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .match-item:hover {
            border-color: rgba(0, 242, 254, 0.3);
            background: rgba(255, 255, 255, 0.05);
        }

        .match-main { display: flex; align-items: center; gap: 25px; flex: 1; }

        .match-status {
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            font-weight: 900;
            width: 65px;
            text-align: center;
            padding: 5px 0;
            border-radius: 6px;
            letter-spacing: 1px;
            flex-shrink: 0;
        }
        .win { background: rgba(0, 255, 133, 0.1); color: var(--good); border: 1px solid rgba(0, 255, 133, 0.4); }
        .loss { background: rgba(255, 75, 75, 0.1); color: var(--bad); border: 1px solid rgba(255, 75, 75, 0.4); }

        .vs-box { font-family: 'Orbitron', sans-serif; display: flex; align-items: center; }
        
        .team-ego-name { color: var(--primary); font-weight: 800; font-size: 17px; letter-spacing: 1px; }
        .vs-text { color: rgba(255,255,255,0.2); font-size: 11px; margin: 0 12px; font-weight: 400; }
        .opponent-name { color: #fff; font-weight: 700; font-size: 16px; opacity: 0.9; }

        .match-details { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }

        .match-score { 
            font-family: 'Orbitron', sans-serif; 
            font-size: 20px; 
            font-weight: 900;
            letter-spacing: 1px;
        }
        .score-win { color: var(--good); text-shadow: 0 0 10px rgba(0, 255, 133, 0.2); }
        .score-loss { color: var(--bad); text-shadow: 0 0 10px rgba(255, 75, 75, 0.2); }

        .match-map {
            font-size: 9px;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .back-nav { margin-bottom: 30px; }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 18px;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: #888;
            font-family: 'Orbitron', sans-serif;
            font-size: 9px;
            text-decoration: none;
            transition: 0.3s;
        }
        .back-btn:hover { border-color: var(--primary); color: var(--primary); }

        @media (max-width: 600px) {
            .match-item { padding: 15px; }
            .team-ego-name { font-size: 14px; }
            .opponent-name { font-size: 13px; }
            .vs-text { margin: 0 8px; }
            .match-main { gap: 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header class="header">
        <a href="/"><img src="/logo.PNG" class="logo-img"></a>
    </header>

    <div class="back-nav">
        <a href="/" class="back-btn">← BACK TO ROSTER</a>
    </div>

    <div class="section-label">MATCH HISTORY</div>

    <div class="match-item" style="animation-delay: 0.1s;">
        <div class="match-main">
            <div class="match-status win">WIN</div>
            <div class="vs-box">
                <span class="team-ego-name">TEAM EGO</span>
                <span class="vs-text">VS</span>
                <span class="opponent-name">NAVI JUNIOR</span>
            </div>
        </div>
        <div class="match-details">
            <div class="match-score score-win">13 : 10</div>
            <div class="match-map">Ancient</div>
        </div>
    </div>

    <div class="match-item" style="animation-delay: 0.2s;">
        <div class="match-main">
            <div class="match-status loss">LOSS</div>
            <div class="vs-box">
                <span class="team-ego-name">TEAM EGO</span>
                <span class="vs-text">VS</span>
                <span class="opponent-name">VITALITY</span>
            </div>
        </div>
        <div class="match-details">
            <div class="match-score score-loss">08 : 13</div>
            <div class="match-map">Anubis</div>
        </div>
    </div>

    <div class="match-item" style="animation-delay: 0.3s;">
        <div class="match-main">
            <div class="match-status win">WIN</div>
            <div class="vs-box">
                <span class="team-ego-name">TEAM EGO</span>
                <span class="vs-text">VS</span>
                <span class="opponent-name">MOUZ NXT</span>
            </div>
        </div>
        <div class="match-details">
            <div class="match-score score-win">16 : 14</div>
            <div class="match-map">Mirage</div>
        </div>
    </div>

</div>

</body>
</html>
