<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Team Ego | Match History</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00f2fe;
            --bg: #05070a;
            --border: rgba(255, 255, 255, 0.1);
            --bad: #ff4b4b;
            --good: #00ff85;
            --modal-bg: rgba(10, 15, 25, 0.98);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1e2a3a 0%, transparent 50%);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 900px; margin: 0 auto; }

        /* --- ШАПКА (КОПИЯ ГЛАВНОГО МЕНЮ ДЛЯ ЦЕНТРОВКИ) --- */
        .header { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            margin-bottom: 40px; 
        }
        
        .logo-link { display: inline-block; line-height: 0; margin-bottom: 15px; }
        
        .logo-img { 
            width: 180px; 
            height: auto;
            filter: drop-shadow(0 0 15px rgba(0, 242, 254, 0.6));
            transition: 0.3s ease;
            cursor: pointer;
        }
        .logo-img:hover { transform: scale(1.05); filter: drop-shadow(0 0 25px var(--primary)); }

        .team-title {
            font-family: 'Orbitron', sans-serif; font-size: 36px; font-weight: 900;
            letter-spacing: 6px; text-transform: uppercase;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        /* --- КНОПКА НАЗАД --- */
        .back-nav { width: 100%; display: flex; justify-content: center; margin-bottom: 40px; }
        .back-btn {
            display: inline-flex; align-items: center; padding: 10px 25px;
            background: rgba(0, 242, 254, 0.05); border: 1px solid var(--primary);
            border-radius: 30px; color: var(--primary); font-family: 'Orbitron', sans-serif;
            font-size: 11px; letter-spacing: 2px; text-decoration: none; text-transform: uppercase; transition: 0.3s;
        }
        .back-btn:hover { background: var(--primary); color: #000; box-shadow: 0 0 20px rgba(0, 242, 254, 0.4); }

        .section-label {
            font-family: 'Orbitron', sans-serif; font-size: 14px; color: var(--primary);
            letter-spacing: 3px; margin: 30px 0 20px; display: flex; align-items: center; gap: 15px;
        }
        .section-label::after { content: ""; height: 1px; flex-grow: 1; background: linear-gradient(to right, var(--primary), transparent); }

        /* --- СПИСОК МАТЧЕЙ --- */
        .match-item {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid var(--border); border-radius: 20px; padding: 25px;
            margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between;
            cursor: pointer; transition: 0.3s ease;
        }
        .match-item:hover { border-color: var(--primary); transform: translateY(-3px); background: rgba(255, 255, 255, 0.05); }

        .match-main { display: flex; align-items: center; gap: 25px; }
        .match-status { font-family: 'Orbitron', sans-serif; font-size: 10px; font-weight: 900; width: 65px; text-align: center; padding: 5px 0; border-radius: 6px; }
        .win { background: rgba(0, 255, 133, 0.1); color: var(--good); border: 1px solid rgba(0, 255, 133, 0.4); }
        .loss { background: rgba(255, 75, 75, 0.1); color: var(--bad); border: 1px solid rgba(255, 75, 75, 0.4); }

        .match-score { font-family: 'Orbitron', sans-serif; font-size: 20px; font-weight: 900; }

        /* --- МОДАЛЬНОЕ ОКНО --- */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); display: flex; align-items: center; justify-content: center;
            z-index: 1000; padding: 20px; backdrop-filter: blur(12px);
            opacity: 0; visibility: hidden; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .modal.active { opacity: 1; visibility: visible; }

        .modal-content {
            background: var(--modal-bg); width: 100%; max-width: 1000px;
            border: 1px solid var(--border); border-radius: 24px;
            padding: 40px; position: relative; max-height: 90vh; overflow-y: auto;
            transform: scale(0.9) translateY(20px); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .modal.active .modal-content { transform: scale(1) translateY(0); }

        .close-modal { position: absolute; top: 20px; right: 25px; font-size: 32px; color: #555; cursor: pointer; transition: 0.2s; }
        .close-modal:hover { color: var(--bad); }

        .table-wrapper { overflow-x: auto; margin-top: 10px; }
        .stats-table { width: 100%; border-collapse: collapse; min-width: 700px; }
        .stats-table th { text-align: left; padding: 12px; color: #444; font-family: 'Orbitron', sans-serif; font-size: 9px; border-bottom: 1px solid var(--border); }
        .stats-table td { padding: 14px 12px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .p-ego { color: var(--primary); font-weight: 700; }
        .num-val { font-family: 'Orbitron', sans-serif; font-size: 12px; }

        .team-banner { background: rgba(255,255,255,0.03); padding: 12px; font-family: 'Orbitron'; font-size: 12px; border-left: 4px solid var(--primary); margin: 25px 0 10px; }

        /* --- МОБИЛКА --- */
        @media (max-width: 600px) {
            .logo-img { width: 110px; }
            .team-title { font-size: 26px; letter-spacing: 3px; }
            .match-item { flex-direction: column; align-items: center; text-align: center; gap: 15px; }
            .match-main { flex-direction: column; gap: 10px; }
            .modal-content { padding: 25px 15px; }
            .stats-score-row { font-size: 18px; display: flex; flex-direction: column; gap: 5px; }
        }
    </style>
</head>
<body>
