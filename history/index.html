<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Team Ego | Match History</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00f2fe;
            --bg: #05070a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --bad: #ff4b4b;
            --good: #00ff85;
        }

        /* Убираем стандартный скроллбар для красоты */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1e2a3a 0%, transparent 50%);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 800px; margin: 0 auto; }

        /* --- ШАПКА (ТОЧНАЯ КОПИЯ ГЛАВНОЙ) --- */
        .header { text-align: center; margin-bottom: 40px; }
        
        .logo-link { display: inline-block; text-decoration: none; }
        .logo-img { 
            width: 180px; 
            height: auto;
            filter: drop-shadow(0 0 15px rgba(0, 242, 254, 0.6));
            margin-bottom: 15px; 
            transition: 0.3s ease;
        }
        .logo-img:hover { filter: drop-shadow(0 0 25px rgba(0, 242, 254, 0.9)); transform: scale(1.05); }

        .team-title {
            font-family: 'Orbitron', sans-serif; font-size: 36px; font-weight: 900;
            letter-spacing: 6px; text-transform: uppercase;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
        }

        .back-btn {
            display: inline-flex; align-items: center; gap: 10px;
            padding: 10px 25px; background: rgba(0, 242, 254, 0.05);
            border: 1px solid var(--primary); border-radius: 30px;
            color: var(--primary); font-family: 'Orbitron', sans-serif;
            font-size: 11px; letter-spacing: 2px; text-decoration: none;
            text-transform: uppercase; transition: 0.3s;
        }
        .back-btn:hover { background: var(--primary); color: #000; box-shadow: 0 0 20px rgba(0, 242, 254, 0.4); }

        .section-label {
            font-family: 'Orbitron', sans-serif; font-size: 14px; color: var(--primary);
            letter-spacing: 3px; margin: 40px 0 20px; display: flex; align-items: center; gap: 15px;
        }
        .section-label::after { content: ""; height: 1px; flex-grow: 1; background: linear-gradient(to right, var(--primary), transparent); }

        /* --- КАРТОЧКИ МАТЧЕЙ (ФИКС ВЕРСТКИ) --- */
        .match-item {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 16px; padding: 20px 30px; margin-bottom: 15px;
            display: flex; align-items: center; justify-content: space-between;
            cursor: pointer; transition: 0.3s;
        }
        .match-item:hover { border-color: var(--primary); background: rgba(255,255,255,0.05); transform: translateX(5px); }

        .match-left { display: flex; align-items: center; gap: 20px; }
        .status-badge {
            font-family: 'Orbitron', sans-serif; font-size: 10px; font-weight: 900;
            padding: 4px 12px; border-radius: 4px; text-transform: uppercase;
        }
        .win-bg { background: rgba(0, 255, 133, 0.1); color: var(--good); border: 1px solid rgba(0, 255, 133, 0.3); }
        .loss-bg { background: rgba(255, 75, 75, 0.1); color: var(--bad); border: 1px solid rgba(255, 75, 75, 0.3); }

        .vs-text { font-family: 'Orbitron', sans-serif; font-size: 16px; font-weight: 700; }
        .vs-text span { color: var(--primary); }
        .vs-text i { font-style: normal; color: rgba(255,255,255,0.2); margin: 0 10px; font-size: 12px; }

        .match-right { text-align: right; }
        .score-text { font-family: 'Orbitron', sans-serif; font-size: 20px; font-weight: 900; line-height: 1; }
        .map-text { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; }

        /* --- МОДАЛЬНОЕ ОКНО (ПЛАВНОСТЬ И ФОН) --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 7, 10, 0.8); backdrop-filter: blur(15px);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; opacity: 0; visibility: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }

        .modal-window {
            background: #0a0e14; width: 95%; max-width: 900px;
            border: 1px solid var(--border); border-radius: 24px;
            position: relative; overflow: hidden; /* Скрываем полосу тут */
            transform: translateY(30px) scale(0.95);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .modal-overlay.active .modal-window { transform: translateY(0) scale(1); }

        .modal-header {
            padding: 30px; text-align: center; border-bottom: 1px solid var(--border);
            background: linear-gradient(to bottom, rgba(255,255,255,0.02), transparent);
        }
        .close-btn { 
            position: absolute; top: 20px; right: 20px; font-size: 24px; 
            color: #444; cursor: pointer; transition: 0.2s; z-index: 10;
        }
        .close-btn:hover { color: var(--bad); }

        .modal-body { 
            padding: 30px; max-height: 70vh; overflow-y: auto; 
            scrollbar-width: none; /* Для Firefox */
        }
        .modal-body::-webkit-scrollbar { display: none; } /* Прячем полосу скролла в модалке */

        .stats-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .stats-table th { 
            font-family: 'Orbitron', sans-serif; font-size: 10px; color: #444; 
            text-align: left; padding: 10px; border-bottom: 1px solid var(--border);
        }
        .stats-table td { padding: 12px 10px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.02); }
        
        .team-name-row { 
            background: rgba(255,255,255,0.03); padding: 8px 15px; 
            font-family: 'Orbitron'; font-size: 12px; margin: 20px 0 10px;
            border-left: 3px solid var(--primary);
        }

        /* Мобилка */
        @media (max-width: 600px) {
            .logo-img { width: 120px; }
            .team-title { font-size: 24px; letter-spacing: 3px; }
            .match-item { padding: 15px; flex-direction: column; gap: 15px; text-align: center; }
            .match-left { flex-direction: column; gap: 10px; }
            .match-right { text-align: center; }
            .modal-window { width: 100%; height: 100%; border-radius: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <header class="header">
        <a href="/" class="logo-link">
            <img src="/logo.PNG" class="logo-img">
        </a>
        <h1 class="team-title">Team Ego</h1>
        <a href="/" class="back-btn">← Back to Roster</a>
    </header>

    <div class="section-label">LATEST MATCHES</div>

    <div class="match-item" onclick="showStats('NAVI JUNIOR', '13:10', 'Ancient', true)">
        <div class="match-left">
            <div class="status-badge win-bg">WIN</div>
            <div class="vs-text"><span>TEAM EGO</span> <i>vs</i> NAVI JUNIOR</div>
        </div>
        <div class="match-right">
            <div class="score-text" style="color:var(--good)">13:10</div>
            <div class="map-text">Ancient</div>
        </div>
    </div>

    <div class="match-item" onclick="showStats('VITALITY', '08:13', 'Anubis', false)">
        <div class="match-left">
            <div class="status-badge loss-bg">LOSS</div>
            <div class="vs-text"><span>TEAM EGO</span> <i>vs</i> VITALITY</div>
        </div>
        <div class="match-right">
            <div class="score-text" style="color:var(--bad)">08:13</div>
            <div class="map-text">Anubis</div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="overlay" onclick="hideStats()">
    <div class="modal-window" onclick="event.stopPropagation()">
        <span class="close-btn" onclick="hideStats()">&times;</span>
        
        <div class="modal-header">
            <div id="mScore" style="font-family:'Orbitron'; font-size:28px; font-weight:900;">13:10</div>
            <div id="mVersus" style="font-family:'Orbitron'; font-size:14px; margin-top:5px; color:#aaa;">TEAM EGO vs NAVI</div>
            <div id="mMap" style="color:var(--primary); font-size:10px; letter-spacing:3px; margin-top:10px; font-family:'Orbitron';">ANCIENT</div>
        </div>

        <div class="modal-body">
            <div class="team-name-row">TEAM EGO</div>
            <table class="stats-table">
                <thead><tr><th>PLAYER</th><th>K</th><th>D</th><th>ADR</th><th>HS%</th></tr></thead>
                <tbody id="egoStats"></tbody>
            </table>

            <div class="team-name-row" id="oppNameRow" style="border-left-color: #444;">OPPONENT</div>
            <table class="stats-table">
                <thead><tr><th>PLAYER</th><th>K</th><th>D</th><th>ADR</th><th>HS%</th></tr></thead>
                <tbody id="oppStats"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    function showStats(opp, score, map, isWin) {
        const overlay = document.getElementById('overlay');
        document.getElementById('mScore').innerText = score;
        document.getElementById('mScore').style.color = isWin ? 'var(--good)' : 'var(--bad)';
        document.getElementById('mVersus').innerHTML = `<span style="color:var(--primary)">TEAM EGO</span> vs ${opp}`;
        document.getElementById('mMap').innerText = map.toUpperCase();
        document.getElementById('oppNameRow').innerText = opp;

        // Данные (пример)
        const egoData = [
            ["himeraa", 22, 14, "95.2", "45%"],
            ["angeldust", 19, 15, "88.0", "52%"],
            ["lanes", 14, 18, "72.4", "38%"],
            ["aimlord", 11, 20, "65.1", "60%"],
            ["soon...", 0, 0, "0.0", "0%"]
        ];

        fillTable('egoStats', egoData);
        fillTable('oppStats', egoData.map(p => ["Enemy", 15, 15, "75.0", "40%"])); // Заглушка для врага

        overlay.classList.add('active');
        document.body.style.overflow = 'hidden'; // Запрет скролла body
    }

    function fillTable(id, data) {
        const tbody = document.getElementById(id);
        tbody.innerHTML = data.map(p => `
            <tr>
                <td style="font-weight:600">${p[0]}</td>
                <td style="font-family:'Orbitron'">${p[1]}</td>
                <td style="font-family:'Orbitron'">${p[2]}</td>
                <td style="color:#aaa">${p[3]}</td>
                <td style="color:#aaa">${p[4]}</td>
            </tr>
        `).join('');
    }

    function hideStats() {
        document.getElementById('overlay').classList.remove('active');
        document.body.style.overflow = 'auto';
    }
</script>

</body>
</html>
